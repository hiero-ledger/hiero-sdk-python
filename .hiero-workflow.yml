# Hiero Workflow Configuration (.hiero-workflow.yml)
# This file governs all automated interactions for this repository.

version: 1

# Pull Request Validation
pull_requests:
  title_check: 
    enabled: true
    pattern: "^(feat|fix|docs|style|refactor|perf|test|chore)(\\(.*\\))?: .*"
    error_message: "PR title must follow Conventional Commits format."
  
  assignee:
    required: true
    error_message: "Please assign this PR to yourself or a maintainer."

# Labeling Logic (Automatic based on paths or rules)
labeling:
  path_map:
    "sdk:python": ["sdk/python/**", "hiero-sdk-python/**"]
    "sdk:cpp": ["sdk/cpp/**", "hiero-sdk-cpp/**"]
    "sdk:js": ["sdk/js/**", "hiero-sdk-js/**"]
    "workflow": [".github/workflows/**"]
    "docs": ["**/*.md", "docs/**"]
  
  size_labels:
    enabled: true
    thresholds:
      small: 50
      medium: 200
      large: 500

# Contributor Progression & Qualification
contributor_checks:
  assignment_restriction:
    enabled: true
    labels:
      "skill:advanced":
        prerequisite_closed_issues: 3
        prerequisite_label: "skill:intermediate"
      "skill:intermediate":
        prerequisite_closed_issues: 1
        prerequisite_label: "skill:beginner"
    
    error_message: |
      Hi @user, I cannot assign you to this issue yet.
      To qualify for **{label}** issues, you need to have completed at least {count} **{prereq}** issues.
      Keep building your experience!

# Stale Management
stale_management:
  issues:
    stale_days: 14
    close_days: 7
    stale_label: "status:stale"
    stale_message: "This issue has been inactive for 14 days and will be closed in 7 days."
  pull_requests:
    stale_days: 30
    close_days: 7
    stale_label: "status:stale"
    stale_message: "This PR has been inactive for 30 days and will be closed in 7 days."
