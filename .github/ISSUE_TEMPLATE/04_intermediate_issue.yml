name: Intermediate Issue Template
description: Create a well-documented issue for contributors ready to own larger tasks independently
title: "[Intermediate]: "
labels: ["intermediate"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ---
        **For issue creators:** Intermediate issues sit between Beginner Issues and Advanced Issues.
        The contributor should be able to research, implement, and test independently —
        but should not need to make architectural decisions or redesign core abstractions.

        If the task can be solved by following examples alone, it belongs in a Beginner Issue.
        If it requires cross-module architectural reasoning, it belongs in Advanced.

        **All links in this template must be absolute URLs** (starting with `https://`).
        Relative links break when rendered in GitHub issues.

        ---

  - type: textarea
    id: before_you_start
    attributes:
      label: 🧩 Intermediate Contributors
      description: |
        THIS SECTION IS PRE-FILLED. LEAVE AS-IS UNLESS YOU NEED TO ADD ISSUE-SPECIFIC PREREQUISITES.
      value: |
        Welcome! This Intermediate Issue is designed for contributors who have completed beginner-level work and are ready to take on more ownership.

        It nudges you to:

        - Research across multiple files and modules
        - Own implementation decisions — not just follow a recipe
        - Write thorough, meaningful tests
        - Deliver a clean, review-ready pull request

        **Prerequisites:**

        > [!IMPORTANT]
        > **Before claiming this issue, you must have:**
        > - Completed at least 1 Good First Issue **and** 1 Beginner Issue
        > - The contribution workflow nailed: signing, rebasing, CHANGELOG, linking issues
        > - The ability to operate independently — you may ask high-level architecture questions, but should not need step-by-step guidance

        > [!TIP]
        > **You should be comfortable with:**
        > - Navigating multiple modules across `src/`, `tests/`, and `examples/`
        > - Reading and following [protobuf definitions](https://github.com/hashgraph/hedera-protobufs/tree/main/services) for correct naming, types, and field ordering
        > - Writing meaningful tests — not just AI-generated tests of AI-generated code
        > - Identifying and avoiding breaking changes to public APIs
        > - Self-reviewing your own PR before submitting

        If this feels like too big a step, that is completely fine — try a
        [Beginner Issue](https://github.com/hiero-ledger/hiero-sdk-python/issues?q=is%3Aissue+state%3Aopen+label%3Abeginner+no%3Aassignee)
        first. You can always come back when you are ready.

        **Support:** A maintainer is available for high-level guidance — implementation approach, test strategy, or design questions. Don't hesitate to ask.

        ⏱️ Typical time to complete: 1 week part-time / 3 days full-time
        🧩 Difficulty: Requires investigation, testing, and polish — most time should go to research and refinement, not coding
        🎓 Best for: Contributors who've completed beginner issues

        ---

        🏁 **When this issue is complete, you will have:**

        ✅ Researched across multiple files and modules
        ✅ Owned implementation decisions
        ✅ Written thorough, meaningful tests
        ✅ Delivered a clean, review-ready pull request
        ✅ Confidence to take on advanced issues
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        DESCRIBE THE PROBLEM CLEARLY.
        YOU MAY ASSUME THE READER CAN NAVIGATE src/, tests/, AND examples/.
        EXPLAIN: WHAT IS WRONG OR MISSING, WHERE IT LIVES, AND WHY IT MATTERS.
        INCLUDE RELEVANT FILE PATHS AND LINKS.
        CONSIDER ADDING: EXPECTED TIME (e.g. 1-2 WEEKS), RELEVANT LABELS, AND A NOTE TO CHECK THE CODERABBIT AI PLAN.
      value: |
        _Replace this with the problem description._

        **Before claiming:**
        - Check the issue labels to see what area this touches
        - Read the CodeRabbit AI plan (posted as a comment) for a rough implementation overview
        - If this feels like too big a step, try a beginner issue first
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example problem (hidden in submission) -->
        ## Example — Problem Description

        The `TransactionGetReceiptQuery` currently exposes the `get_children()` method,
        but the behavior is inconsistent with how child receipts are returned by the Mirror Node.

        In particular:
        - The SDK always returns only the parent receipt
        - There is no way to opt-in to retrieving child receipts
        - Similar query objects already support optional flags to extend the response

        This limitation makes it difficult to inspect scheduled or child transactions
        without issuing additional manual queries.

        Relevant files:
        - `src/hiero_sdk_python/query/transaction_get_receipt_query.py`
        - `examples/query/transaction_get_receipt_query.py`

  - type: textarea
    id: solution
    attributes:
      label: 💡 Expected Solution
      description: |
        BRIEFLY STATE WHAT THE CONTRIBUTOR SHOULD BUILD OR FIX.
        THIS SHOULD BE A SHORT SUMMARY OF THE EXPECTED OUTCOME — NOT A DETAILED IMPLEMENTATION GUIDE.
        EXAMPLE: "Add a __repr__ method to AccountId that shows shard, realm, and num."
      value: |
        _Replace this with a brief solution summary._
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example solution (hidden in submission) -->
        ## Example — Expected Solution

        Introduce an optional configuration flag on `TransactionGetReceiptQuery`
        that allows callers to explicitly request child receipts.

        The change should:
        - Be opt-in (default behavior must remain unchanged)
        - Reuse existing response parsing logic where possible
        - Avoid introducing breaking API changes

        Example usage:

        ```python
        receipt = (
            TransactionGetReceiptQuery()
            .set_transaction_id(tx_id)
            .set_include_children(True)
            .execute(client)
        )
        ```

  - type: textarea
    id: research
    attributes:
      label: 🔍 Background Research
      description: |
        POINT THE CONTRIBUTOR TOWARD RELEVANT FILES, SIMILAR CODE, PROTOBUF DEFINITIONS, OR PATTERNS TO STUDY.
        THIS IS THE "INVESTIGATE BEFORE YOU CODE" STEP.
      value: |
        _Replace this with research pointers._
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example research (hidden in submission) -->
        ## Example — Background Research

        - Open `src/hiero_sdk_python/query/transaction_get_receipt_query.py` and read how the query is built
        - Compare with `TransactionGetRecordQuery` which already supports similar flags
        - Check the [protobuf definition](https://github.com/hashgraph/hedera-protobufs/blob/main/services/transaction_get_receipt.proto) for the response structure
        - Look at how child receipts are structured in the proto response

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation
      description: |
        DESCRIBE WHAT THE CONTRIBUTOR SHOULD BUILD AFTER COMPLETING THEIR RESEARCH.
        KEEP IT HIGH-LEVEL — THEY SHOULD FIGURE OUT THE DETAILS FROM THEIR RESEARCH.
      value: |
        _Replace this with implementation guidance._
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example implementation (hidden in submission) -->
        ## Example — Implementation

        - Add an optional boolean field (e.g. `_include_children`) to `TransactionGetReceiptQuery`
        - Ensure the flag is passed to the mirror node request
        - Update response parsing to include child receipts when present
        - Keep default behavior unchanged (backwards compatible)
        - Extend the existing example to demonstrate the new behavior

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Requirements
      description: |
        EDIT THIS SECTION TO MATCH THE TYPE OF CHANGE. DELETE CATEGORIES THAT DO NOT APPLY.
        TESTING IS A MAJOR COMPONENT OF INTERMEDIATE ISSUES — SET CLEAR EXPECTATIONS.
      value: |
        How you test depends on the type of change.
        See the [testing guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/testing.md) for full details.

        > [!IMPORTANT]
        > At the intermediate level, **testing is a major component** — not an afterthought.
        > Each method you implement should be verified. Tests should cover happy paths,
        > edge cases, and error handling. Tests must be understandable and reviewable,
        > not just generated by AI.

        **Source code changes (e.g. Python files in `src/`):**
        - Write unit tests covering happy path, edge cases, and error handling
        - Run tests locally: `uv run pytest tests/unit/<specific_file>_test.py -v`
        - Verify naming, types, and field ordering match [protobuf definitions](https://github.com/hashgraph/hedera-protobufs/tree/main/services)
        - Check consistency with similar classes already in the SDK — use the same patterns
        - Integration tests will run automatically when you push

        **GitHub Actions / workflow changes (e.g. files in `.github/`):**
        - Test by merging to your fork's `main` and simulating the scenario
        - Create test issues or PRs as evidence and link them in your PR
        - Include screenshots of workflow runs where applicable

        **Example script changes (e.g. files in `examples/`):**
        - Run the example script and confirm output matches expected behavior
        - Compare your example with similar existing examples for consistency
        - You will need a [Hedera Portal](https://portal.hedera.com/) account for testnet credentials

        **In your PR, include links to test evidence:** screenshots, terminal output, test issue/PRs, or script results.
    validations:
      required: false

  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        PRE-FILLED GUIDANCE. LEAVE AS-IS.
      value: |
        Intermediate PRs cover more code and touch more sensitive areas. This section helps you
        deliver a PR that is ready to merge on first or second review.

        **⚠️ Breaking changes**
        - Before changing any function signature, return type, or public API — stop and check
        - If a breaking change is unavoidable: add backwards compatibility and get explicit maintainer approval **before** implementing
        - Run existing tests to verify nothing breaks: `uv run pytest tests/unit/ -v`

        **🤖 AI-assisted code**
        - AI is a powerful tool — but every suggestion must be verified, not just accepted
        - Cross-reference AI output against [protobuf definitions](https://github.com/hashgraph/hedera-protobufs/tree/main/services) and similar SDK implementations
        - Do not submit AI-generated tests that merely test AI-generated code — tests should verify real behavior and edge cases
        - If AI output and existing SDK patterns disagree, trust the SDK

        **📦 PR packaging**
        - Self-review your diff line by line before submitting
        - Clean git history — no rebase artifacts, merge commits, or unrelated files
        - CHANGELOG entry under `[Unreleased]`
        - Link test evidence (screenshots, terminal output, test PRs) in your PR description
        - Ensure all CI checks pass before requesting review
        - Double and triple check — intermediate PRs are time-consuming to review
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Done Checklist
      description: |
        EDIT OR ADD CRITERIA SPECIFIC TO THIS ISSUE. THE DEFAULTS COVER THE STANDARD REQUIREMENTS.
      value: |
        Before opening your PR, confirm:

        - [ ] My changes fully address the problem described above
        - [ ] I verified naming, types, and patterns against protobuf definitions and similar SDK classes
        - [ ] I tested my changes thoroughly (see testing section above) and linked evidence in my PR
        - [ ] I checked for breaking changes — no existing tests fail, no public APIs changed without approval
        - [ ] I did not modify files unrelated to this issue
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/signing.md)
        - [ ] I added a CHANGELOG.md entry under `[Unreleased]` — [Changelog guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/changelog_entry.md)
        - [ ] All CI checks pass
        - [ ] I self-reviewed my PR before requesting review
    validations:
      required: true

  - type: textarea
    id: contribution_steps
    attributes:
      label: 📋 Workflow quick reference
      description: |
        PRE-FILLED REFERENCE TABLE. LEAVE AS-IS.
      value: |
        You know the workflow — here are the links if you need them:

        | Step | Guide |
        |------|-------|
        | Claim this issue | Comment `/assign` below |
        | Sync with main | [Rebasing guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/rebasing.md) |
        | Open a PR and link this issue | [PR guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/training/workflow/11_submit_pull_request.md) · [Linking guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/how_to_link_issues.md) |
        | Resolve merge conflicts | [Merge conflicts guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/merge_conflicts.md) |
        | Testing | [Testing guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/testing.md) |
    validations:
      required: false

  - type: textarea
    id: ai_tips
    attributes:
      label: 🤖 Tips for using AI tools
      description: |
        PRE-FILLED GUIDANCE. LEAVE AS-IS.
      value: |
        Here is how to get the most out of AI tools at the intermediate level:

        - Use [Pylance](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/pylance.md) in VS Code to catch type errors and hallucinated methods in real time
        - Always verify AI suggestions against [protobuf definitions](https://github.com/hashgraph/hedera-protobufs/tree/main/services) — AI often gets field names, types, or ordering wrong
        - Build your solution in small steps — add print statements or logs to confirm each piece works before moving on
        - When AI suggests code, check it against similar classes in the SDK — that is the best source of Python SDK-specific patterns
        - If AI output and SDK patterns disagree, trust the SDK
        - Write tests that verify real behavior, not tests that test AI-generated code
    validations:
      required: false

  - type: textarea
    id: stuck
    attributes:
      label: 🆘 Stuck?
      description: |
        PRE-FILLED GUIDANCE. LEAVE AS-IS.
      value: |
        Intermediate issues can be challenging — it is completely normal to get blocked. Here is what to do:

        - **Comment on this issue** and describe what you have tried. A maintainer will respond.
        - **Ask on [Discord](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/discord.md)** in #hiero-python-sdk for quick questions.
        - **Join [Office Hours](https://zoom-lfx.platform.linuxfoundation.org/meeting/99912667426?password=5b584a0e-1ed7-49d3-b2fc-dc5ddc888338)** (Wednesdays, 2pm UTC) for live, hands-on help with a maintainer — screen sharing welcome.

        At this level, you are expected to research independently — but asking good, high-level questions is a strength, not a weakness. Don't spend more than an hour blocked without asking.
    validations:
      required: false

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources
      description: |
        ADD ANY TASK-SPECIFIC RESOURCES BELOW — RELEVANT PROTOBUF DEFINITIONS, PYTHON DOCS, OR SPECIFIC FILES IN THE CODEBASE.
      value: |
        **Project references:**
        - [Project structure](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/training/setup/project_structure.md)
        - [CONTRIBUTING.md](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/CONTRIBUTING.md)
        - [Browse closed intermediate PRs](https://github.com/hiero-ledger/hiero-sdk-python/pulls?q=is%3Apr+is%3Amerged+label%3Aintermediate) — see how others did it

        **Protobuf references:**
        - [Hedera Protobufs](https://github.com/hashgraph/hedera-protobufs/tree/main/services) — source of truth for field names, types, and ordering
        - [Protobuf language guide](https://protobuf.dev/programming-guides/proto3/)

        **Python references:**
        - [Python official docs](https://docs.python.org/3/)
        - [Data model (dunder methods)](https://docs.python.org/3/reference/datamodel.html)
        - [Type hints](https://docs.python.org/3/library/typing.html)
        - [unittest.mock](https://docs.python.org/3/library/unittest.mock.html) — for mocking in tests
    validations:
      required: false
