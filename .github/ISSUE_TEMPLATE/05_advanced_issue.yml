name: Advanced Issue Template
description: Architecture-level changes requiring design reasoning, cross-module awareness, and trade-off analysis
title: "[Advanced]: "
labels: ["advanced"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Advanced issues are for work where the solution is not fully defined and the problem may be imperfectly described.
        Expected: architectural reasoning, trade-off analysis, and awareness of long-term impact.
        Changes at this level may affect multiple modules, public APIs, or core system behavior.

        If the task follows existing patterns, use an [Intermediate Issue](https://github.com/hiero-ledger/hiero-sdk-python/issues/new/choose) instead.
        Before claiming, share your proposed approach as a comment and wait for maintainer feedback.
        See [CONTRIBUTING.md](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/CONTRIBUTING.md) for expectations on timeline, review process, and quality bar.

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: What is broken, missing, or insufficient? Which modules are affected and why does it matter? Include relevant file paths and links.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: High-level design direction. Cover the intended approach, any new or changed abstractions, backwards-compatibility constraints, and alternatives considered with reasons for rejection.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: 🚧 Non-Goals
      description: What is explicitly out of scope? Define boundaries to prevent scope creep.
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: Optional. Specific modules, refactoring strategy, deprecation concerns, security considerations, or open design decisions left for the contributor to resolve.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Done Checklist
      description: Edit or extend for this issue. Remove items that do not apply.
      value: |
        - [ ] Architectural approach reviewed by a maintainer before implementation began
        - [ ] Implementation fully addresses the problem and design goals above
        - [ ] No breaking changes — or explicit maintainer approval obtained
        - [ ] Naming, types, and field ordering verified against [Hedera protobufs](https://github.com/hashgraph/hedera-protobufs/tree/main/services)
        - [ ] All submitted code is personally understood — no unvalidated generated output
        - [ ] No files modified outside the scope of this issue
        - [ ] Commits signed: `git commit -S -s -m "type: description"`
        - [ ] CHANGELOG.md updated under `[Unreleased]`
        - [ ] All CI checks pass
        - [ ] PR description covers: decision made, alternatives considered, trade-offs, risks, and open questions
        - [ ] PR diff self-reviewed before requesting review
    validations:
      required: true

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources
      description: Add issue-specific references. Remove defaults that do not apply.
      value: |
        - [CONTRIBUTING.md](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/CONTRIBUTING.md)
        - [Project structure](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/training/setup/project_structure.md)
        - [Hedera protobufs](https://github.com/hashgraph/hedera-protobufs/tree/main/services)
        - [Closed advanced PRs](https://github.com/hiero-ledger/hiero-sdk-python/pulls?q=is%3Apr+is%3Amerged+label%3Aadvanced)
        - [Java SDK](https://github.com/hiero-ledger/hiero-sdk-java) · [JavaScript SDK](https://github.com/hiero-ledger/hiero-sdk-js) · [Go SDK](https://github.com/hiero-ledger/hiero-sdk-go)
    validations:
      required: false