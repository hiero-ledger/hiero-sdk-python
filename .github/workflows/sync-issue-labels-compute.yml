name: Compute Linked Issue Labels

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to sync labels for"
        required: true
        type: number
      dry-run-enabled:
        description: "Dry run (log only, do not apply labels)"
        required: false
        type: boolean
        default: true

permissions:
  pull-requests: read
  issues: read
  contents: read

jobs:
  compute-labels:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
    runs-on: hl-sdk-py-lin-md
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main

      - name: Compute linked issue labels
        id: compute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          DRY_RUN: 'true'
          REQUESTED_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['dry-run-enabled'] || 'true' }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || 'false' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          result-encoding: json
          script: |
            const script = require('./.github/scripts/sync-issue-labels.js');
            const result = await script({ github, context });
            const labels = result?.labels || [];
            const hasLabels = labels.length > 0;
            core.setOutput('has_labels', String(hasLabels));
            core.setOutput('labels', JSON.stringify(labels));
            core.setOutput('pr_number', String(process.env.PR_NUMBER || ''));
            core.setOutput('dry_run', String(process.env.REQUESTED_DRY_RUN || 'true'));
            core.setOutput('is_fork_pr', String(process.env.IS_FORK_PR || 'false'));
            core.setOutput('source_event', context.eventName);
            console.log('Computed labels:', JSON.stringify({ hasLabels, labels, pr_number: process.env.PR_NUMBER, dry_run: process.env.REQUESTED_DRY_RUN, is_fork_pr: process.env.IS_FORK_PR, source_event: context.eventName }));
            return { has_labels: hasLabels, labels: labels, pr_number: process.env.PR_NUMBER, dry_run: process.env.REQUESTED_DRY_RUN, is_fork_pr: process.env.IS_FORK_PR, source_event: context.eventName };

      - name: Write labels artifact payload
        env:
          LABELS_JSON: ${{ steps.compute.outputs.labels }}
          PR_NUMBER: ${{ steps.compute.outputs.pr_number }}
          IS_FORK_PR: ${{ steps.compute.outputs.is_fork_pr }}
          DRY_RUN: ${{ steps.compute.outputs.dry_run }}
          SOURCE_EVENT: ${{ steps.compute.outputs.source_event }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const parsed = JSON.parse(process.env.LABELS_JSON || '[]');
            const payload = {
              pr_number: Number(process.env.PR_NUMBER || 0),
              labels: Array.isArray(parsed) ? parsed : [],
              is_fork_pr: /^true$/i.test(process.env.IS_FORK_PR || ''),
              dry_run: /^true$/i.test(process.env.DRY_RUN || ''),
              source_event: process.env.SOURCE_EVENT || '',
            };
            fs.writeFileSync('labels.json', JSON.stringify(payload));
            console.log(`Wrote labels artifact payload for PR #${payload.pr_number}: ${payload.labels.length} labels`);

      - name: Upload labels artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-labels-${{ steps.compute.outputs.pr_number }}
          path: labels.json
          retention-days: 1

      - name: Trigger add workflow
        uses: step-security/workflow-dispatch@b4c1dc0afa074d0b4f0e653d3b80d4b2798599aa # v1.2.7
        with:
          workflow: .github/workflows/sync-issue-labels-add.yml
          repo: hiero-ledger/hiero-sdk-python
          ref: ${{ github.ref }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          inputs: >-
            {
              "upstream_run_id":"${{ github.run_id }}",
              "pr_number":"${{ steps.compute.outputs.pr_number }}",
              "dry_run":"${{ steps.compute.outputs.dry_run }}",
              "is_fork_pr":"${{ steps.compute.outputs.is_fork_pr }}"
            }

