name: Secondary PR Check - Examples
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "examples/**"
      - "src/**"
      - "pyproject.toml"
      - "generate_proto.py"
      - ".github/scripts/pr-check-secondary-examples.js"
      - ".github/scripts/__tests__/pr-check-secondary-examples.test.js"
      - ".github/scripts/jest.config.js"
      - ".github/scripts/package.json"
      - ".github/workflows/pr-check-secondary-examples.yml"
  pull_request:
    paths:
      - "examples/**"
      - "src/**"
      - "pyproject.toml"
      - "generate_proto.py"
      - ".github/scripts/pr-check-secondary-examples.js"
      - ".github/scripts/__tests__/pr-check-secondary-examples.test.js"
      - ".github/scripts/jest.config.js"
      - ".github/scripts/package.json"
      - ".github/workflows/pr-check-secondary-examples.yml"
  workflow_dispatch:

concurrency:
  group: examples-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  run-examples:
    runs-on: ${{ (github.repository_owner != 'hiero-ledger' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && 'ubuntu-latest' || 'hl-sdk-py-lin-md' }}
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-packages --all-extras

      - name: Test script
        run: npm test
        working-directory: .github/scripts

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@531a2b283ca4912df537d64bf89da0f6be4c2574 # v0.22.0
        with:
          installMirrorNode: true
          soloVersion: v0.74.0
          mirrorNodeVersion: v0.153.0
          hieroVersion: v0.73.0

      - name: Run Examples
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          CHAIN_ID: 012A
          NETWORK: solo
        run: node .github/scripts/pr-check-secondary-examples.js
