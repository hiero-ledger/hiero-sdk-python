name: Secondary PR Check - Examples
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "examples/**"
      - "src/**"
      - "pyproject.toml"
      - "generate_proto.py"
      - ".github/scripts/pr-check-secondary-examples.js"
      - ".github/scripts/__tests__/pr-check-secondary-examples.test.js"
      - ".github/scripts/jest.config.js"
      - ".github/scripts/package.json"
      - ".github/workflows/pr-check-secondary-examples.yml"
  pull_request:
    paths:
      - "examples/**"
      - "src/**"
      - "pyproject.toml"
      - "generate_proto.py"
      - ".github/scripts/pr-check-secondary-examples.js"
      - ".github/scripts/__tests__/pr-check-secondary-examples.test.js"
      - ".github/scripts/jest.config.js"
      - ".github/scripts/package.json"
      - ".github/workflows/pr-check-secondary-examples.yml"
  workflow_dispatch:

concurrency:
  group: examples-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  run-examples:
    runs-on: ${{ (github.repository_owner != 'hiero-ledger' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && 'ubuntu-latest' || 'hl-sdk-py-lin-md' }}
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-packages --all-extras

      - name: Test script
        run: npm test
        working-directory: .github/scripts

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@c397dc8f75a4d24ae0be621529d7f9dfe8a9f460 # v0.21.0
        with:
          installMirrorNode: true
          soloVersion: v0.74.0
          mirrorNodeVersion: v0.153.0
          hieroVersion: v0.73.0

      - name: Run Examples
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          CHAIN_ID: 012A
          NETWORK: solo
        run: node .github/scripts/pr-check-secondary-examples.js
