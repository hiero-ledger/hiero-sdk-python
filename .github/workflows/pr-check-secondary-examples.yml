# Runs when /examples files are modified (even alongside other changes).
# The script handles changed examples first, then runs all

name: Secondary PR Check - Examples

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "examples/**"
  pull_request:
    paths:
      - "examples/**"
  workflow_dispatch:

# Prevent multiple runs for the same PR/branch, and cancel in-progress runs if a new commit is pushed
concurrency:
  group: examples-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-examples:
    runs-on: ${{ (github.repository_owner != 'hiero-ledger' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && 'ubuntu-latest' || 'hl-sdk-py-lin-md' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 #v0.15.0
        with:
          installMirrorNode: true

      - name: Run Examples
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          CHAIN_ID: 012A
          NETWORK: solo
        run: node .github/scripts/pr-check-secondary-examples.js
