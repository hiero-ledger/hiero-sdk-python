name: Primary PR Check - Code-coverage

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/unit/**"
      - ".github/workflows/pr-check-primary-codecov.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/unit/**"
      - ".github/workflows/pr-check-primary-codecov.yml"

permissions:
  contents: read

jobs:
  coverage:
    runs-on: hl-sdk-py-lin-md

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: |
          uv sync --frozen --all-groups --all-packages --all-extras

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Run unit tests and generate coverage report
        run: |
          uv run pytest tests/unit \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: github.repository_owner == 'hiero-ledger'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
