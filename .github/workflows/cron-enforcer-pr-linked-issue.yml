# This workflow automatically closes pull requests without a linked issue after 1 day.

name: Linked Issue Enforcer

on:
  schedule:
    - cron: "0 2 * * *" # Every day at 2:00 AM
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, do not post comments (dry run). Accepts "true" or "false". Default true for manual runs.'
        required: false
        default: "true"

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-linked-issue-checker:
    runs-on: hl-sdk-py-lin-md
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Enforce linked issues on PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ env.DRY_RUN }}
          HOURS_BEFORE_CLOSE: "2"
          REQUIRE_AUTHOR_ASSIGNED: "true"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const script = require('./.github/scripts/cron-enforcer-pr-linked-issue.js');
            await script({ github, context});
