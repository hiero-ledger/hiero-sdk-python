name: PythonBot - Community Call Reminder

on:
    schedule:
        - cron: "0 10 * * 3"
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Run in dry mode (no comments will be posted)"
                required: false
                default: "true"
                type: choice
                options:
                    - "true"
                    - "false"

permissions:
    contents: read
    issues: write

concurrency:
    group: community-call-reminder
    cancel-in-progress: false

