name: Identify Good First Issue Candidates

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
  schedule:
    # Daily scan at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      request_coderabbit:
        description: 'Post a CodeRabbit review request comment on newly-labeled candidates'
        required: true
        default: true
        type: boolean
      max_issues_to_label:
        description: 'Safety cap for labels added in one run (start with 3-5/day)'
        required: true
        default: '5'
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: identify-good-first-issue-candidates-${{ github.event_name }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  identify-candidates:
    name: Identify and Label Beginner-Friendly Issues
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Analyze issues and label candidates
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          REQUEST_CODERABBIT: ${{ github.event.inputs.request_coderabbit || 'true' }}
          MAX_ISSUES_TO_LABEL: ${{ github.event.inputs.max_issues_to_label || '5' }}
        with:
          script: |
            const handler = require('./.github/scripts/bot-identify-good-first-issue-candidates.js');
            await handler({ github, context, core });
