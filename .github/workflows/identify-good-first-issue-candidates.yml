name: Identify Good First Issue Candidates

on:
  schedule:
    # Daily scan at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      max_issues_per_run:
        description: 'Safety cap for candidate issues created in one run (recommended: 3-5)'
        required: true
        default: '5'
        type: string
      min_confidence:
        description: 'Minimum confidence required to create candidate issues'
        required: true
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high
      dry_run:
        description: 'Run scan without creating issues'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: identify-good-first-issue-candidates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  identify-candidates:
    name: Scan Repository and Create GFI Candidate Issues
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan repo and create candidate issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          MAX_ISSUES_PER_RUN: ${{ github.event.inputs.max_issues_per_run || '5' }}
          MIN_CONFIDENCE: ${{ github.event.inputs.min_confidence || 'medium' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          RECENT_CLOSED_LOOKBACK_DAYS: '45'
          MAX_FILES_TO_SCAN: '1800'
          MAX_FILE_SIZE_BYTES: '240000'
        with:
          script: |
            const handler = require('./.github/scripts/bot-identify-good-first-issue-candidates.js');
            await handler({ github, context, core });
