name: ClusterFuzzLite PR Fuzzing

on:
  pull_request:
    paths:
      - ".clusterfuzzlite/**"
      - ".github/workflows/clusterfuzzlite.yml"
      - "generate_proto.py"
      - "pyproject.toml"
      - "src/**"
      - "tests/fuzz/**"
  push:
    branches:
      - "main"
    paths:
      - ".clusterfuzzlite/**"
      - ".github/workflows/clusterfuzzlite.yml"
      - "generate_proto.py"
      - "pyproject.toml"
      - "src/**"
      - "tests/fuzz/**"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

concurrency:
  group: clusterfuzzlite-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-fuzzing:
    name: PR Fuzzing (${{ matrix.sanitizer }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}
          output-sarif: true

  continuous-build:
    name: Continuous Fuzzer Build (${{ matrix.sanitizer }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}
          upload-build: true
