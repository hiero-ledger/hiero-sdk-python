name: "Test: Add Reviewers as Assignees Bot"

on:
  pull_request:
    paths:
      - '.github/workflows/bot-pr-add-reviewers-as-assignees.yml'
      - '.github/workflows/test-bot-pr-add-reviewers-as-assignees.yml'
      - '.github/scripts/bot-pr-add-reviewers-as-assignees.js'
      - '.github/scripts/test-bot-pr-add-reviewers-as-assignees.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: hl-sdk-py-lin-md
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1


      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Run Reviewer Assignee Bot Tests
        run: node .github/scripts/test-bot-pr-add-reviewers-as-assignees.js