name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: hl-sdk-py-lin-md
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Upgrade pip
        run: pip install "pip==26.0.1"

      # Dependency versions are pinned to ensure reproducible builds.
      # These should be periodically reviewed and updated for ensuring smooth execution.
      - name: Install build, pdm-backend, and grpcio-tools
        run: pip install build==1.5 pdm-backend==2.4.8 grpcio-tools==1.76.0

      - name: Generate Protobuf
        run: python generate_proto.py

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate build provenance attestations
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-and-sign:
    name: Publish and sign release artifacts
    needs: build
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    runs-on: hl-sdk-py-lin-md
    environment:
      name: pypi
      url: https://pypi.org/p/hiero-sdk-python
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Sign release distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
          verify: true
          verify-cert-identity: https://github.com/${{ github.repository }}/.github/workflows/publish.yml@refs/tags/${{ github.ref_name }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com

      - name: Prepare distributions for PyPI upload
        run: |
          mkdir -p publish-dist
          cp dist/*.whl publish-dist/
          cp dist/*.tar.gz publish-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: publish-dist
          skip-existing: true
          attestations: true

      - name: Upload signed assets to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body: |
            ## Important notes
            - See https://github.com/hiero-ledger/hiero-sdk-python/milestones for the pull requests included in this milestone.
            - This release includes auto-generated release notes.
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
          fail_on_unmatched_files: true
          generate_release_notes: true
